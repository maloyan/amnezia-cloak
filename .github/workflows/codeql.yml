name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'  # Mondays 06:17 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Swift
    runs-on: macos-14
    # Swift CodeQL extraction is slow-starting on macOS runners; 15m was not
    # enough cold. Give it real headroom.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: autobuild

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
