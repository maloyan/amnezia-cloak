name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift build
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Swift version
        run: swift --version

      - name: Build library & executable
        run: swift build -c debug

      - name: Run unit tests
        run: swift test --parallel

  lint:
    name: Lint & Format check
    runs-on: macos-14
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: SwiftLint (strict)
        run: swiftlint --strict

      - name: Install swift-format
        run: brew install swift-format

      - name: swift-format --lint
        run: swift-format lint --recursive --strict Sources Tests

  bundle:
    name: Build .app & DMG
    runs-on: macos-14
    needs: [test, lint]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Build bundle + DMG
        run: ./build.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: Amnezia-Cloak-dmg
          path: Amnezia-Cloak.dmg
          retention-days: 14
