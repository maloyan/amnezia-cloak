name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build DMG & publish GitHub Release
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build bash 5 (awg-quick requires bash 4+, macOS only has 3.2)
        run: |
          set -euo pipefail
          mkdir -p /tmp/bash-build
          curl -fsSL https://ftp.gnu.org/gnu/bash/bash-5.2.37.tar.gz \
               -o /tmp/bash-build/bash.tgz
          tar -xf /tmp/bash-build/bash.tgz -C /tmp/bash-build --strip-components 1
          cd /tmp/bash-build
          ./configure --disable-nls --without-bash-malloc --prefix=/usr/local >/dev/null
          make -j$(sysctl -n hw.logicalcpu) >/dev/null
          mkdir -p "$GITHUB_WORKSPACE/scripts/bin"
          cp bash "$GITHUB_WORKSPACE/scripts/bin/bash"
          "$GITHUB_WORKSPACE/scripts/bin/bash" --version | head -1
          file "$GITHUB_WORKSPACE/scripts/bin/bash"

      - name: Build amneziawg-tools (awg, awg-quick)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-tools.git /tmp/awg-tools
          cd /tmp/awg-tools/src
          make PLATFORM=darwin
          # Makefile produces `src/wg` (inherited from upstream wireguard-tools)
          # and `src/wg-quick/darwin.bash`. `make install` renames them to
          # `awg` / `awg-quick` — we replicate those two renames manually so
          # we don't need DESTDIR gymnastics.
          mkdir -p "$GITHUB_WORKSPACE/scripts/bin"
          cp wg              "$GITHUB_WORKSPACE/scripts/bin/awg"
          cp wg-quick/darwin.bash "$GITHUB_WORKSPACE/scripts/bin/awg-quick"
          chmod +x "$GITHUB_WORKSPACE/scripts/bin/awg" "$GITHUB_WORKSPACE/scripts/bin/awg-quick"
          # amneziawg-tools' Makefile copies darwin.bash verbatim, but the
          # script internally calls `wg show/setconf/showconf` — which we
          # renamed to `awg`. Rewrite every bare `wg ` call to `awg `. Use
          # perl because BSD sed on macos-14 doesn't support \b word boundary
          # in its extended-regex mode (v0.13's sed call matched zero lines
          # and silently shipped an unpatched script). Word boundary +
          # trailing space leaves `wg-quick`, `wg(8)` comments, and
          # `WG_CONFIG` untouched.
          perl -i -pe 's/\bwg /awg /g' "$GITHUB_WORKSPACE/scripts/bin/awg-quick"
          matches=$(grep -cE '(^| |	|\()awg (show|setconf|showconf)' "$GITHUB_WORKSPACE/scripts/bin/awg-quick")
          echo "wg → awg exec calls rewritten: $matches"
          [ "$matches" -ge 7 ] || { echo "expected ≥7 matches, got $matches"; exit 1; }
          file "$GITHUB_WORKSPACE/scripts/bin/"awg*

      - name: Build amneziawg-go
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-go.git /tmp/awg-go
          cd /tmp/awg-go
          go build -trimpath -ldflags "-s -w" -o amneziawg-go .
          cp amneziawg-go "$GITHUB_WORKSPACE/scripts/bin/amneziawg-go"
          file "$GITHUB_WORKSPACE/scripts/bin/amneziawg-go"

      - name: Build bundle + DMG
        run: ./build.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: Amnezia-Cloak.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
