name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build DMG & publish GitHub Release
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build bash 5 (awg-quick requires bash 4+, macOS only has 3.2)
        run: |
          set -euo pipefail
          mkdir -p /tmp/bash-build
          curl -fsSL https://ftp.gnu.org/gnu/bash/bash-5.2.37.tar.gz \
               -o /tmp/bash-build/bash.tgz
          tar -xf /tmp/bash-build/bash.tgz -C /tmp/bash-build --strip-components 1
          cd /tmp/bash-build
          ./configure --disable-nls --without-bash-malloc --prefix=/usr/local >/dev/null
          make -j$(sysctl -n hw.logicalcpu) >/dev/null
          mkdir -p "$GITHUB_WORKSPACE/scripts/bin"
          cp bash "$GITHUB_WORKSPACE/scripts/bin/bash"
          "$GITHUB_WORKSPACE/scripts/bin/bash" --version | head -1
          file "$GITHUB_WORKSPACE/scripts/bin/bash"

      - name: Build amneziawg-tools (awg, awg-quick)
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-tools.git /tmp/awg-tools
          cd /tmp/awg-tools/src
          make PLATFORM=darwin
          # Makefile produces `src/wg` (inherited from upstream wireguard-tools)
          # and `src/wg-quick/darwin.bash`. `make install` renames them to
          # `awg` / `awg-quick` — we replicate those two renames manually so
          # we don't need DESTDIR gymnastics.
          mkdir -p "$GITHUB_WORKSPACE/scripts/bin"
          cp wg              "$GITHUB_WORKSPACE/scripts/bin/awg"
          cp wg-quick/darwin.bash "$GITHUB_WORKSPACE/scripts/bin/awg-quick"
          chmod +x "$GITHUB_WORKSPACE/scripts/bin/awg" "$GITHUB_WORKSPACE/scripts/bin/awg-quick"
          # amneziawg-tools' Makefile copies darwin.bash verbatim, but the
          # script as-shipped is missing three patches Amnezia's own macOS
          # installer applies. Without them the daemon-startup races and
          # silently bails. We re-implement all three here:
          #
          #   1. `wg ` → `awg ` — binary was renamed at install time, but the
          #      script still calls `wg show/setconf/showconf`.
          #   2. `/var/run/wireguard/` → `/var/run/amneziawg/` — cleanup paths
          #      point at the WireGuard runtime dir, not AmneziaWG's.
          #   3. Insert `sleep 0.3; chmod 444 "$WG_TUN_NAME_FILE"` after the
          #      `amneziawg-go utun` call. Without the sleep, get_real_interface
          #      checks for the .name file before the daemon has written it,
          #      returns 1, and add_if bails.
          #
          # Perl is used because BSD sed on macos-14 doesn't support \b in
          # its extended-regex mode (v0.13 sed attempt silently matched zero
          # lines and shipped an unpatched script).
          perl -i -ne '
              s{\bwg }{awg }g;
              s{/var/run/wireguard/}{/var/run/amneziawg/}g;
              print;
              if (/cmd "?\$\{WG_QUICK_USERSPACE_IMPLEMENTATION:-amneziawg-go\}"? utun/) {
                  print "\tsleep 0.3; chmod 444 \"\$WG_TUN_NAME_FILE\" 2>/dev/null\n";
              }
          ' "$GITHUB_WORKSPACE/scripts/bin/awg-quick"
          # Assertions — any of these returning 0 means a patch silently no-op'd.
          awg_calls=$(grep -cE '(^| |	|\()awg (show|setconf|showconf)' "$GITHUB_WORKSPACE/scripts/bin/awg-quick")
          amnz_paths=$(grep -c '/var/run/amneziawg/' "$GITHUB_WORKSPACE/scripts/bin/awg-quick")
          wg_leftovers=$(grep -c '/var/run/wireguard/' "$GITHUB_WORKSPACE/scripts/bin/awg-quick")
          sleep_inserted=$(grep -c 'sleep 0.3; chmod 444' "$GITHUB_WORKSPACE/scripts/bin/awg-quick")
          echo "patches: awg-calls=$awg_calls amneziawg-paths=$amnz_paths wg-leftovers=$wg_leftovers sleep=$sleep_inserted"
          [ "$awg_calls" -ge 7 ] && [ "$amnz_paths" -ge 8 ] && [ "$wg_leftovers" -eq 0 ] && [ "$sleep_inserted" -eq 1 ] \
              || { echo "awg-quick patch failed sanity check"; exit 1; }
          file "$GITHUB_WORKSPACE/scripts/bin/"awg*

      - name: Build amneziawg-go
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/amnezia-vpn/amneziawg-go.git /tmp/awg-go
          cd /tmp/awg-go
          go build -trimpath -ldflags "-s -w" -o amneziawg-go .
          cp amneziawg-go "$GITHUB_WORKSPACE/scripts/bin/amneziawg-go"
          file "$GITHUB_WORKSPACE/scripts/bin/amneziawg-go"

      - name: Build bundle + DMG
        run: ./build.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: Amnezia-Cloak.dmg
          generate_release_notes: true
          fail_on_unmatched_files: true
