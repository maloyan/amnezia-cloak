repos:
  - repo: local
    hooks:
      - id: swift-format-lint
        name: swift-format lint
        entry: swift-format lint --recursive --strict Sources Tests
        language: system
        files: \.swift$
        pass_filenames: false

      - id: swiftlint
        name: swiftlint --strict
        entry: swiftlint --strict
        language: system
        files: \.swift$
        pass_filenames: false

      - id: swift-test
        name: swift test
        entry: swift test --parallel
        language: system
        files: \.swift$
        pass_filenames: false
        stages: [pre-push]
